<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

.parent1{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.child1{
    background:rgb(221, 226, 228);
    width:500px;
    height:750px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.child2{
    background:rgb(48, 144, 203);
    width:500px;
    height:200px;
    border-radius:10px 10px 0 0;
}

.child3{
    width:200px;
    height:200px;
    border-radius:50%;
    margin-left:150px;
    position:relative;
    top:100px;
    border:5px solid rgb(48, 144, 203);
    overflow:hidden;
    background:white;
}

.child3 img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.child4{
    width:200px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:150px;
    margin-top:120px;
    font-size:30px;
    font-weight:bold;
}

.child5{
    width:250px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:125px;
    font-size:20px;
    color:#555;
    font-weight:bold;
}

.child6{
    display:flex;
    justify-content:space-evenly;
    margin-top:40px;
}

.child6 img{
    width:50px;
    height:50px;
    cursor:pointer;
}
.child7{
    display:flex;
    justify-content:space-evenly;
    margin-top:35px;
}

.child12{
    background:#0084ff;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

.child13{
    background:red;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

.child8{
    display:flex;
    justify-content:space-evenly;
    margin-top:40px;
}

.child9,
.child10,
.child11{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.child9 img,
.child10 img,
.child11 img{
    width:40px;
    height:40px;
}

.child9 p,
.child10 p,
.child11 p{
    margin-top:8px;
    font-size:18px;
    font-weight:bold;
}
</style>
