<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e5e5e5;
    font-family:Arial,sans-serif;
}

.big-box{
    width:800px;
    height:600px;
    background:#630274;
    border:4px solid #000;
    border-radius:100px;
    padding:35px;
}

.container{
    height:100%;
    display:grid;
    grid-template-columns:200px 220px 220px;
    grid-template-rows:140px 140px 180px;
    gap:25px;
}

.box{
    border:4px solid #000;
    border-radius:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.box1{
    background:#1620d8;
}

.box2{
    background:#1620d8;
    color:#d6d6d6;
    font-size: 50px;
}

.box3{
    background:#1620d8;
    color:#d6d6d6;
    font-size: 50px;
}

.box4{
    background:#1620d8;
    color:#f3ecec;
    font-size: 50px;
}

.box5{
    background:#6470e2;
    color:#fff;
    font-size: 30px;
}

.box6{
    background:#1620d8;
    color:#fff;
    grid-column:1 / 3;
    border-radius:40px;
    font-size: 20px;
}

.box7{
    background:#fff;
    color:#2a1414;
    grid-column:3;
    grid-row:2 / 4;
    border-radius:40px;
    font-size: 50px;
}
</style>
</head>

<body>

<div class="big-box">

    <div class="container">

        <div class="box box1"></div>

        <div class="box box2">25 K</div>

        <div class="box box3">50 K</div>

        <div class="box box4">1,538</div>

        <div class="box box5">DESIGN</div>

        <div class="box box6">A PLACE TO LEARN UI DESIGN &WEB DESIGN.</div>

        <div class="box box7">2000 K</div>

    </div>

</div>

</body>
</html>
